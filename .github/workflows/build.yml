name: Cloud AAB Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Configure Signing and Build Release
        run: |
          # Inject signing credentials securely into the build configurations
          cat << 'SIGN' >> android/key.properties
          storePassword=mysecretpassword
          keyPassword=mysecretpassword
          keyAlias=upload
          storeFile=release-keystore.jks
          SIGN
          
          # Run the official production compilation pipeline
          flutter clean
          flutter pub get
          flutter build appbundle --release
          
      - name: Save Signed Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-store-bundle
          path: build/app/outputs/bundle/release/app-release.aab
