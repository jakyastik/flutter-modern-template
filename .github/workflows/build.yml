name: Cloud AAB Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - name: Update Package ID, Fix Syntax, and Build
        run: |
          # 1. Update the package name
          sed -i 's/com.example.moderntemplate.flutter_modern_template/com.savemyaccount.verificationapp/g' android/app/build.gradle.kts
          
          # 2. Fix the flutter.versionCode and versionName syntax errors
          sed -i 's/flutter.versionCode/flutter.versionCode()/g' android/app/build.gradle.kts
          sed -i 's/flutter.versionName/flutter.versionName()/g' android/app/build.gradle.kts
          
          # 3. Run clean compilation
          flutter clean
          flutter pub get
          flutter build appbundle --debug
          
      - name: Save Uploadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-store-bundle
          path: build/app/outputs/bundle/debug/app-debug.aab
