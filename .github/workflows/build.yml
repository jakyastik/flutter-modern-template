name: Cloud AAB Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - name: Clean Cache and Build Release
        run: |
          # 1. Inject the signing key
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
          
          # 2. Hard clear all build caches to destroy the v1 embedding memory residue
          flutter clean
          rm -rf android/.gradle
          rm -rf android/app/build
          
          # 3. Force fetch pristine dependencies
          flutter pub get
          
          # 4. Compile directly to production
          flutter build appbundle --release
          
      - name: Save Signed Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-store-bundle
          path: build/app/outputs/bundle/release/app-release.aab
