name: Cloud AAB Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - name: Build Unsigned Release Bundle
        run: |
          flutter clean
          flutter pub get
          # Building with --debug handles cloud compilation without needing signing keys
          flutter build appbundle --debug
          
      - name: Save Uploadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-store-bundle
          path: build/app/outputs/bundle/debug/app-debug.aab